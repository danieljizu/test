server:
  port: 8082
  servlet:
    context-path: /

spring:
  application:
    name: post-service
  datasource:
    url: jdbc:postgresql://${POSTGRES_HOST:localhost}:${POSTGRES_PORT:5432}/${POSTGRES_DB:redsocialperiferia}
    username: ${POSTGRES_USER:rspadmin}
    password: ${POSTGRES_PASSWORD:rsp_secure_pass_2024}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: none
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true

jwt:
  secret: ${JWT_SECRET:redsocialperiferia_jwt_secret_key_2024_super_secure}
  expiration-ms: ${JWT_EXPIRATION_MS:86400000}

springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /docs
    operations-sorter: method

logging:
  level:
    com.periferia.posts: INFO
    org.springframework.security: WARN
